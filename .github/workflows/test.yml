on: push
jobs:
  freebsd:
    runs-on: macos-10.15
    steps:
      - uses: actions/checkout@v3
      - uses: vmactions/freebsd-vm@v0
        with:
          prepare: pkg install -y go tmate
          run: ssh-keygen -t rsa -m pem -b 4096 -f ~/.ssh/id_rsa && tmate -F
          # go test -buildvcs=false -race ./...
